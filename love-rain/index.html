<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 cmatrix --love · Love Rain</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0a0410;overflow:hidden;
    font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;
    cursor:crosshair;user-select:none;-webkit-user-select:none;
  }
  canvas{display:block;position:fixed;top:0;left:0;}

  #hint{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:10;color:rgba(255,255,255,.25);font-size:12px;
    letter-spacing:2px;pointer-events:none;
    transition:opacity .5s;
  }
  #mode{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    z-index:10;color:rgba(255,255,255,.3);font-size:13px;
    letter-spacing:3px;pointer-events:none;transition:all .5s;
  }
  #burst-count{
    position:fixed;top:20px;right:24px;
    z-index:10;color:rgba(255,255,255,.15);font-size:11px;
    pointer-events:none;font-family:"Courier New",monospace;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="mode">💕 全模式</div>
<div id="hint">🖱️ 点击绽放心动 · 空格键切换模式</div>
<div id="burst-count"></div>

<script>
// ═══════════════════════════════════════════
// Canvas
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════
// 模式
// ═══════════════════════════════════════════
const MODES = [
  { name: '💕 全模式',   emojis: ['❤️','💕','💗','💖','💝','💘','💓','💞','🩷','🌸','🌺','🌷','🌹','💐','✨','💫','🦋','🎀','💌','🤍'] },
  { name: '❤️ 红心',   emojis: ['❤️','💕','💗','💖','💝','💘','💓','💞','🩷','♥','❣','💟'] },
  { name: '🌸 花雨',   emojis: ['🌸','🌺','🌷','🌹','🌼','🌻','💐','✿','❀','🏵️','💮','🪷'] },
  { name: '✨ 星尘',   emojis: ['✨','⭐','🌟','💫','✧','✦','⭑','˚','･','♪','✴'] },
  { name: '🩷 粉彩',   emojis: ['🩷','💗','💖','🌸','💝','🎀','💕','💓','💞','🦩'] },
];
let modeIdx = 0;

function getEmojis() { return MODES[modeIdx].emojis; }
function randEmoji() {
  const arr = getEmojis();
  return arr[Math.floor(Math.random() * arr.length)];
}

// ═══════════════════════════════════════════
// 粒子系统
// ═══════════════════════════════════════════
const MAX_PARTICLES = 300;
let particles = [];
let burstParticles = []; // 点击炸开的小粒子
let totalFallen = 0;

class Particle {
  constructor(x, y, fromBurst = false) {
    this.reset(x, y, fromBurst);
  }

  reset(x, y, fromBurst = false) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? -(20 + Math.random() * H * 0.5);
    this.emoji = randEmoji();

    // 飘落物理
    const speed = 0.3 + Math.random() * 1.2;
    this.vy = speed * (fromBurst ? 0.3 : 1);
    this.vx = (Math.random() - 0.5) * 0.6;

    // 摇摆参数
    this.swayAmp = 0.3 + Math.random() * 1.5;    // 摇摆幅度
    this.swayFreq = 0.01 + Math.random() * 0.03; // 摇摆频率
    this.swayPhase = Math.random() * Math.PI * 2;

    // 旋转
    this.rotation = Math.random() * 360;
    this.rotSpeed = (Math.random() - 0.5) * 1.5;

    // 外观
    this.size = 14 + Math.random() * 22;
    this.opacity = 0.4 + Math.random() * 0.6;
    this.life = 1.0;

    // 光晕色
    this.glowHue = 340 + Math.random() * 30; // 粉红范围

    this.fromBurst = fromBurst;
  }

  update() {
    // 正弦摇摆
    this.swayPhase += this.swayFreq;
    this.x += this.vx + Math.sin(this.swayPhase) * this.swayAmp * 0.3;

    // 下落
    this.y += this.vy;

    // 旋转
    this.rotation += this.rotSpeed;

    // 爆裂粒子衰减更快
    if (this.fromBurst) {
      this.life -= 0.008;
      this.opacity *= 0.995;
      this.vy += 0.002; // 微重力
    }

    // 出界检测
    const margin = 40;
    if (this.y > H + margin || this.y < -margin ||
        this.x > W + margin || this.x < -margin ||
        this.life <= 0) {
      return false;
    }
    return true;
  }

  draw(ctx, trailAlpha = 1) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation * Math.PI / 180);

    const alpha = this.opacity * trailAlpha;
    const hsla = `hsla(${this.glowHue}, 80%, 70%, ${alpha * 0.5})`;

    // 光晕
    ctx.shadowColor = hsla;
    ctx.shadowBlur = 8 + this.size * 0.3;

    // 主文字
    ctx.font = `${this.size}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, 0, 0);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
function initParticles() {
  particles = [];
  burstParticles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle(
      Math.random() * W,
      Math.random() * -H
    ));
  }
}
initParticles();

// ═══════════════════════════════════════════
// 点击绽放
// ═══════════════════════════════════════════
function burstAt(x, y) {
  const count = 12 + Math.floor(Math.random() * 12);
  for (let i = 0; i < count; i++) {
    const p = new Particle(x, y, true);
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 4;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed - 1;
    p.size = 10 + Math.random() * 14;
    p.life = 1.5 + Math.random() * 1.5;
    p.opacity = 0.7 + Math.random() * 0.3;
    p.fromBurst = true;
    burstParticles.push(p);
  }
  totalFallen++;
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function drawBackground() {
  // 渐变背景
  const grad = ctx.createRadialGradient(W/2, H*0.3, 50, W/2, H, Math.max(W,H));
  grad.addColorStop(0, '#1a0a18');
  grad.addColorStop(0.5, '#0d0512');
  grad.addColorStop(1, '#05020a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 微光晕（模拟远处城市灯光）
  const vignette = ctx.createRadialGradient(W/2, H/2, W*0.4, W/2, H/2, W*0.9);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  // 拖尾
  ctx.fillStyle = 'rgba(10,4,16,0.08)';
  ctx.fillRect(0, 0, W, H);

  drawBackground();

  // 更新并绘制主粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update()) {
      particles[i].reset(Math.random() * W, -30);
      totalFallen++;
    }
    particles[i].draw(ctx);
  }

  // 更新并绘制爆裂粒子
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    if (!burstParticles[i].update()) {
      burstParticles.splice(i, 1);
      continue;
    }
    burstParticles[i].draw(ctx);
  }

  // 更新计数器
  if (totalFallen > 0 && Math.floor(totalFallen / 100) !== Math.floor((totalFallen - 1) / 100)) {
    document.getElementById('burst-count').textContent = `🌸 ×${totalFallen}`;
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════
// 事件
// ═══════════════════════════════════════════
canvas.addEventListener('click', (e) => {
  burstAt(e.clientX, e.clientY);
});

// 移动端触摸
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const touch of e.touches) {
    burstAt(touch.clientX, touch.clientY);
  }
}, { passive: false });

// 空格键切换模式
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    modeIdx = (modeIdx + 1) % MODES.length;
    document.getElementById('mode').textContent = MODES[modeIdx].name;
    document.getElementById('mode').style.transform =
      'translateX(-50%) scale(1.3)';
    setTimeout(() => {
      document.getElementById('mode').style.transform =
        'translateX(-50%) scale(1)';
    }, 200);
  }
});

// 鼠标移动微影响（可选）
let mouseX = W/2, mouseY = H/2;
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
// 自动淡出提示
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('hint').style.opacity = '.25';
  }, 8000);
}, 5000);

render();

console.log('💕 cmatrix --love 已就绪');
console.log('   🖱️ 点击绽放心动 · 空格键切换模式');
console.log('   ❤️🌸💕 五种主题：全模式 / 红心 / 花雨 / 星尘 / 粉彩');
</script>
</body>
</html>
