<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦋 蝴蝶曲线 · Butterfly Curve</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a18; color: #d4d4d4;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow-x: hidden;
  }
  h1 {
    font-family: "Georgia", "Noto Serif SC", serif;
    font-size: 28px; color: #7eb8da; letter-spacing: 3px;
    margin: 24px 0 4px; font-weight: 400;
  }
  .subtitle {
    font-size: 13px; color: #556; margin-bottom: 12px;
    font-style: italic;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(60, 120, 180, 0.12);
  }
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    justify-content: center; margin: 20px 16px; max-width: 600px;
  }
  .control-group {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .control-group label {
    font-size: 11px; color: #778; letter-spacing: 1px;
  }
  input[type="range"] {
    -webkit-appearance: none; width: 140px; height: 4px;
    background: #1a1a2e; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #7eb8da; cursor: pointer;
    box-shadow: 0 0 10px rgba(126, 184, 218, 0.4);
  }
  .param-value {
    font-size: 22px; color: #7eb8da; font-weight: 700;
    font-family: "Georgia", serif; min-width: 50px; text-align: center;
  }
  button {
    background: #7eb8da; color: #0a0a18; border: none;
    padding: 8px 20px; border-radius: 20px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all .2s; letter-spacing: 1px;
  }
  button:hover { opacity: .85; transform: scale(1.03); }
  button.paused { background: #444; color: #999; }
  .color-presets {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .color-presets button {
    font-size: 11px; padding: 5px 12px; letter-spacing: 0.5px; border-radius: 12px;
  }
  .color-presets .active { outline: 2px solid #fff; outline-offset: 2px; }
  .info {
    font-size: 12px; color: #556; margin-bottom: 24px;
    max-width: 500px; text-align: center; line-height: 1.8;
    padding: 0 16px;
  }
  .info em { color: #778; font-style: normal; }
</style>
</head>
<body>

<h1>蝴 蝶 曲 线</h1>
<p class="subtitle">Temple Fay · Butterfly Curve</p>

<canvas id="canvas" width="600" height="600"></canvas>

<div class="controls">
  <div class="control-group">
    <label>轨迹周期</label>
    <input type="range" id="loopsSlider" min="1" max="8" step="1" value="4">
    <span class="param-value" id="loopsValue">4</span>
  </div>
  <div class="control-group">
    <label>缩放</label>
    <input type="range" id="scaleSlider" min="30" max="80" step="1" value="58">
    <span class="param-value" id="scaleValue">58</span>
  </div>
  <button id="animBtn">⏸ 暂停</button>
  <button id="resetBtn">🔄 重绘</button>
</div>

<div class="color-presets">
  <button data-theme="classic" class="active">🦋 经典蓝紫</button>
  <button data-theme="sunset">🌅 日落橙</button>
  <button data-theme="forest">🌿 翡翠绿</button>
  <button data-theme="mono">⚪ 银白</button>
</div>

<p class="info">
  <em>x</em> = sin <em>t</em> · (e<sup>cos t</sup> − 2cos 4t − sin⁵ t/12) &nbsp;|&nbsp;
  <em>y</em> = cos <em>t</em> · (e<sup>cos t</sup> − 2cos 4t − sin⁵ t/12) &nbsp;|&nbsp;
  拖动滑块调整周期 & 缩放
</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;

let loops = 4;           // t 的范围 = loops * 2π
let scale = 58;          // 振幅
let animating = true;
let drawProgress = 0;
let totalPoints = 8000;
let points = [];
let particles = [];
let currentTheme = 'classic';

// ── 颜色主题 ──
const themes = {
  classic:  { hueStart: 0.60, hueEnd: 0.80, sat: 0.75, val: 0.85 },
  sunset:   { hueStart: 0.05, hueEnd: 0.15, sat: 0.80, val: 0.88 },
  forest:   { hueStart: 0.30, hueEnd: 0.50, sat: 0.65, val: 0.82 },
  mono:     { hueStart: 0.60, hueEnd: 0.60, sat: 0.05, val: 0.90 },
};

// ── 计算蝴蝶曲线 ──
function computeButterfly(loops, scale) {
  const pts = [];
  const maxT = loops * 2 * Math.PI;  // loops × 2π
  const steps = Math.floor(totalPoints * (loops / 4));  // 随周期调整点数
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * maxT;
    const r = Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5);
    const x = CX + scale * Math.sin(t) * r;
    const y = CY + scale * Math.cos(t) * r;
    pts.push({ x, y, t });
  }
  return pts;
}

// ── 渐变色 ──
function getColor(progress, alpha = 1, themeName) {
  const th = themes[themeName] || themes.classic;
  const hue = th.hueStart + (th.hueEnd - th.hueStart) * progress;
  // 中部更亮 (progress ≈ 0.5 时最亮)
  const distFromCenter = Math.abs(progress - 0.5) * 2; // 0=中部, 1=两端
  const sat = th.sat * (1 - distFromCenter * 0.4);
  const val = th.val * (1 - distFromCenter * 0.3);
  // HSV → RGB 简易转换
  const h = ((hue % 1) + 1) % 1;
  const s = Math.max(0, Math.min(1, sat));
  const v = Math.max(0, Math.min(1, val));
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t_ = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i % 6) {
    case 0: r = v; g = t_; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t_; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t_; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return `rgba(${Math.floor(r*255)},${Math.floor(g*255)},${Math.floor(b*255)},${alpha})`;
}

// ── 粒子 ──
function spawnParticles() {
  particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: CX + (Math.random() - 0.5) * 500,
      y: CY + (Math.random() - 0.5) * 500,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      life: Math.random(),
      maxLife: 0.5 + Math.random() * 1.5,
      size: 0.3 + Math.random() * 1.5,
    });
  }
}

// ── 背景光晕 ──
function drawGlow() {
  const gradient = ctx.createRadialGradient(CX, CY, 40, CX, CY, 300);
  gradient.addColorStop(0, 'rgba(80, 140, 200, 0.04)');
  gradient.addColorStop(0.5, 'rgba(80, 140, 200, 0.01)');
  gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);
}

// ── 主绘制 ──
let animationId;

function draw(timestamp) {
  ctx.clearRect(0, 0, W, H);
  drawGlow();

  // 更新进度
  if (animating) {
    drawProgress += 0.002;
    if (drawProgress > 1) drawProgress = 0;
  }

  // 绘制蝴蝶曲线
  const visibleCount = Math.floor(drawProgress * points.length);
  if (visibleCount > 1) {
    // 主线条
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < visibleCount; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = getColor(drawProgress * 0.7, 0.75, currentTheme);
    ctx.lineWidth = 1.6;
    ctx.shadowColor = getColor(drawProgress * 0.7, 0.2, currentTheme);
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 光晕层
    if (visibleCount > 10) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < visibleCount; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.strokeStyle = getColor(drawProgress * 0.5, 0.25, currentTheme);
      ctx.lineWidth = 0.6;
      ctx.shadowBlur = 0;
      ctx.stroke();
    }
  }

  // 粒子
  for (const p of particles) {
    p.life += 0.004;
    if (p.life > p.maxLife) {
      p.life = 0;
      p.x = CX + (Math.random() - 0.5) * 500;
      p.y = CY + (Math.random() - 0.5) * 500;
    }
    p.x += p.vx;
    p.y += p.vy;
    const alpha = Math.sin(p.life / p.maxLife * Math.PI) * 0.35;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150, 200, 240, ${alpha})`;
    ctx.fill();
  }

  // 绘制笔尖
  if (visibleCount > 0) {
    const tip = points[Math.min(visibleCount, points.length - 1)];
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(160, 210, 255, 0.7)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  animationId = requestAnimationFrame(draw);
}

// ── 事件 ──
function reset() {
  points = computeButterfly(loops, scale);
  drawProgress = 0;
  document.getElementById('loopsValue').textContent = loops;
  document.getElementById('scaleValue').textContent = scale;
  document.getElementById('loopsSlider').value = loops;
  document.getElementById('scaleSlider').value = scale;
}

document.getElementById('loopsSlider').addEventListener('input', function() {
  loops = parseInt(this.value);
  reset();
});
document.getElementById('scaleSlider').addEventListener('input', function() {
  scale = parseInt(this.value);
  reset();
});

document.getElementById('animBtn').addEventListener('click', function() {
  animating = !animating;
  this.textContent = animating ? '⏸ 暂停' : '▶ 播放';
  this.classList.toggle('paused', !animating);
});
document.getElementById('resetBtn').addEventListener('click', reset);

document.querySelectorAll('.color-presets button').forEach(btn => {
  btn.addEventListener('click', function() {
    currentTheme = this.dataset.theme;
    document.querySelectorAll('.color-presets button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

// ── 启动 ──
spawnParticles();
reset();
draw();

console.log('🦋 蝴蝶曲线已就绪');
console.log('   拖动周期/缩放滑块 | 切换颜色主题');
</script>
</body>
</html>
