<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 cmatrix --love · Love Rain</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    /* CSS 渐变背景替代每帧重绘 */
    background:radial-gradient(ellipse at 50% 30%,#1a0a18 0%,#0d0512 50%,#05020a 100%);
    overflow:hidden;
    font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;
    cursor:crosshair;user-select:none;-webkit-user-select:none;
  }
  canvas{display:block;position:fixed;top:0;left:0;}
  #hint{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:10;color:rgba(255,255,255,.25);font-size:12px;
    letter-spacing:2px;pointer-events:none;transition:opacity .5s;
  }
  #mode{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    z-index:10;color:rgba(255,255,255,.30);font-size:13px;
    letter-spacing:3px;pointer-events:none;transition:all .2s;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="mode">💕 全模式</div>
<div id="hint">🖱️ 点击绽放心动 · 空格键切换模式</div>

<script>
// ═══════════════════════════════════════════
// Canvas
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: true });
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════
// 模式
// ═══════════════════════════════════════════
const MODES = [
  { name: '💕 全模式', emojis: ['❤️','💕','💗','💖','💝','💘','💓','💞','🩷','🌸','🌺','🌷','🌹','💐','✨','💫','🦋','🎀','💌','🤍'] },
  { name: '❤️ 红心',   emojis: ['❤️','💕','💗','💖','💝','💘','💓','💞','🩷','♥','❣','💟'] },
  { name: '🌸 花雨',   emojis: ['🌸','🌺','🌷','🌹','🌼','🌻','💐','✿','❀','🏵️','💮'] },
  { name: '✨ 星尘',   emojis: ['✨','⭐','🌟','💫','✧','✦','⭑','♪'] },
  { name: '🩷 粉彩',   emojis: ['🩷','💗','💖','🌸','💝','🎀','💕','💓','💞'] },
];
let modeIdx = 0;
function randEmoji() {
  const arr = MODES[modeIdx].emojis;
  return arr[Math.floor(Math.random() * arr.length)];
}

// ═══════════════════════════════════════════
// 粒子池（预分配，避免 GC）
// ═══════════════════════════════════════════
const MAX_MAIN = 220;
const mainPool = [];
const bursts = [];

// 用普通对象代替 class，减少开销
function createParticle(x, y, burst) {
  return {
    x:  x ?? Math.random() * W,
    y:  y ?? -(30 + Math.random() * H * 0.5),
    vx: burst ? 0 : (Math.random() - 0.5) * 0.5,
    vy: (0.3 + Math.random() * 1.2) * (burst ? 0.3 : 1),
    emoji: randEmoji(),
    size: 14 + Math.random() * 22,
    alpha: 0.4 + Math.random() * 0.6,
    swayAmp: 0.3 + Math.random() * 1.2,
    swayFreq: 0.012 + Math.random() * 0.028,
    swayPhase: Math.random() * Math.PI * 2,
    life: burst ? (1.2 + Math.random() * 1.2) : Infinity,
    burst: !!burst,
  };
}

// 初始化主粒子
for (let i = 0; i < MAX_MAIN; i++) {
  mainPool.push(createParticle(Math.random() * W, Math.random() * -H));
}

// ═══════════════════════════════════════════
// 点击绽放
// ═══════════════════════════════════════════
function burstAt(x, y) {
  const n = 14 + (Math.random() * 10) | 0;
  for (let i = 0; i < n; i++) {
    const p = createParticle(x, y, true);
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 3;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed - 0.8;
    p.size = 10 + Math.random() * 12;
    p.alpha = 0.8;
    bursts.push(p);
  }
}

// ═══════════════════════════════════════════
// 更新
// ═══════════════════════════════════════════
function updateMain(p) {
  p.swayPhase += p.swayFreq;
  p.x += p.vx + Math.sin(p.swayPhase) * p.swayAmp * 0.25;
  p.y += p.vy;
  // 出界则重置到顶部
  if (p.y > H + 50 || p.x < -50 || p.x > W + 50) {
    p.x = Math.random() * W;
    p.y = -(30 + Math.random() * 80);
    p.emoji = randEmoji();
  }
}

function updateBurst(p) {
  p.swayPhase += p.swayFreq * 2;
  p.x += p.vx + Math.sin(p.swayPhase) * p.swayAmp * 0.2;
  p.y += p.vy;
  p.vy += 0.015; // 微重力
  p.life -= 0.012;
  p.alpha *= 0.994;
  return p.life > 0 && p.alpha > 0.02;
}

// ═══════════════════════════════════════════
// 渲染（极限优化版）
// ═══════════════════════════════════════════
// 全局预设，避免每粒子重复设置
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

function drawParticle(p) {
  ctx.font = `${p.size}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
  ctx.fillText(p.emoji, p.x, p.y);
}

function render() {
  // 拖尾 — 只做这一件事，不重绘背景
  ctx.fillStyle = 'rgba(10,4,16,0.07)';
  ctx.fillRect(0, 0, W, H);

  // 主粒子
  for (let i = 0; i < mainPool.length; i++) {
    updateMain(mainPool[i]);
    drawParticle(mainPool[i]);
  }

  // 爆裂粒子
  for (let i = bursts.length - 1; i >= 0; i--) {
    if (!updateBurst(bursts[i])) {
      bursts.splice(i, 1);
      continue;
    }
    drawParticle(bursts[i]);
  }

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════
// 事件
// ═══════════════════════════════════════════
canvas.addEventListener('click', (e) => burstAt(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const t of e.touches) burstAt(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    modeIdx = (modeIdx + 1) % MODES.length;
    const el = document.getElementById('mode');
    el.textContent = MODES[modeIdx].name;
    el.style.transform = 'translateX(-50%) scale(1.3)';
    setTimeout(() => el.style.transform = 'translateX(-50%) scale(1)', 180);
    // 刷新主粒子 emoji
    const arr = MODES[modeIdx].emojis;
    for (const p of mainPool) p.emoji = arr[Math.floor(Math.random() * arr.length)];
  }
});

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
// 提示自动淡出
setTimeout(() => {
  const h = document.getElementById('hint');
  h.style.opacity = '0';
  setTimeout(() => { h.style.opacity = '.25'; }, 8000);
}, 5000);

render();

console.log('💕 cmatrix --love 已就绪 (性能优化版)');
console.log('   220粒子 · 无shadowBlur · 无save/restore · CSS渐变背景');
</script>
</body>
</html>
